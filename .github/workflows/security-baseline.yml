name: security-baseline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily — trips the repo red the day a suppression expires, with no
    # human action. Off-peak, off the top-of-hour rush.
    - cron: "23 6 * * *"
  workflow_dispatch:

jobs:
  baseline:
    # Reusable lives at security-baseline-reusable.yml (NOT security-baseline.yml):
    # this caller is fanned out to security-baseline.yml in every repo INCLUDING
    # shared-actions, so the reusable must sit on a different filename or the
    # fan-out clobbers it with a self-referential call (the 2026-06-14 outage).
    uses: rhodium-org/shared-actions/.github/workflows/security-baseline-reusable.yml@v1
