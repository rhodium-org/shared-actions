name: selftest

# Two scenarios, both must pass for the action to be considered green:
#   1. clean image  → gate PASSES   (action exits 0)
#   2. CVE image    → gate BLOCKS   (action exits non-zero; we invert)
#
# Run on every push to main, every PR, and on a daily schedule so the
# CVE database catching up with a new release of one of our base
# images doesn't go undetected.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Daily at 03:17 UTC — off the top-of-hour rush.
    - cron: '17 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clean-must-pass:
    name: clean image — gate must PASS
    runs-on: [self-hosted, org, linux, docker]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: clean
        name: Build clean fixture through the gate
        uses: ./actions/trivy-gated-build
        with:
          image-name: ghcr.io/rhodium-org/shared-actions-selftest-clean
          context: tests/clean
          dockerfile: tests/clean/Dockerfile
          # A passing predicate guard must NOT break a clean build.
          predicate-guard: tests/guard-pass.sh
          push: 'false'

      - name: Confirm clean image passed
        run: echo "OK — Trivy did not flag the clean fixture; passing guard let it through."

  guard-violation-must-block:
    name: predicate guard violated — gate must BLOCK
    runs-on: [self-hosted, org, linux, docker]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # INVERTED expectation: a failing predicate guard must abort the gate
      # BEFORE any build, proving a suppression can't outlive its
      # justification. continue-on-error keeps the job alive to assert.
      - id: guard
        name: Build clean fixture but with a VIOLATED guard (expect failure)
        continue-on-error: true
        uses: ./actions/trivy-gated-build
        with:
          image-name: ghcr.io/rhodium-org/shared-actions-selftest-guard
          context: tests/clean
          dockerfile: tests/clean/Dockerfile
          predicate-guard: tests/guard-fail.sh
          push: 'false'

      - name: Assert gate BLOCKED on the violated guard
        if: steps.guard.outcome != 'failure'
        run: |
          echo "::error::SELFTEST REGRESSION — a failing predicate-guard did NOT block the gate."
          echo "::error::The predicate-guard step's non-zero exit is no longer fatal."
          exit 1

      - name: Confirm guard worked
        if: steps.guard.outcome == 'failure'
        run: echo "OK — violated predicate guard correctly blocked the gate before build."

  sentinel-cve-must-block:
    name: CVE fixture — gate must BLOCK
    runs-on: [self-hosted, org, linux, docker]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The expectation here is INVERTED: this step must exit non-zero.
      # continue-on-error: true keeps the job alive so the assertion
      # step below can check the outcome.
      - id: cve
        name: Build CVE-laden fixture (expect failure)
        continue-on-error: true
        uses: ./actions/trivy-gated-build
        with:
          image-name: ghcr.io/rhodium-org/shared-actions-selftest-cve
          context: tests/sentinel-cve
          dockerfile: tests/sentinel-cve/Dockerfile
          push: 'false'

      - name: Assert gate BLOCKED the CVE image
        if: steps.cve.outcome != 'failure'
        run: |
          echo "::error::SELFTEST REGRESSION — the gate did NOT block the sentinel-CVE fixture."
          echo "::error::Either pyyaml 5.1 dropped out of Trivy's database, or the action's exit-code: '1' wiring is broken."
          exit 1

      - name: Confirm gate worked
        if: steps.cve.outcome == 'failure'
        run: echo "OK — gate correctly blocked the sentinel-CVE fixture."

  security-policy-meta-guards:
    name: security-policy-check — meta-guards
    runs-on: [self-hosted, org, linux, docker]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - run: python -m pip install --quiet 'pyyaml>=6,<7'

      # Fixtures are generated at runtime with relative dates so the
      # selftest's own expiries never rot — the framework must not be
      # vulnerable to the rot it polices.
      - name: Assert meta-guards pass/fail correctly
        shell: bash
        run: |
          # GitHub's default shell is `bash -e`; disable exit-on-error so the
          # intentional non-zero exits below (expected failures) don't abort
          # the step before we assert them. We exit 1 explicitly at the end.
          set +e -u
          CHECK="actions/security-policy-check/check.py"
          OK_DATE=$(date -d "+30 days" +%Y-%m-%d)
          SOON_DATE=$(date -d "+5 days" +%Y-%m-%d)
          PAST_DATE=$(date -d "-3 days" +%Y-%m-%d)
          FAR_DATE=$(date -d "+400 days" +%Y-%m-%d)
          fails=0
          run() {  # run <expected-exit> <label>
            local want="$1" label="$2"
            python "$CHECK" --policy fix.yaml --guards-dir none --report /dev/null \
              >/tmp/out 2>&1
            local got=$?
            if [ "$got" != "$want" ]; then
              echo "::error::[$label] expected exit $want, got $got"; cat /tmp/out
              fails=$((fails+1))
            else
              echo "OK [$label] exit=$got"
            fi
          }

          printf 'vulnerabilities:\n  - id: CVE-1\n    statement: "safe — not reachable"\n    expired_at: %s\n' "$OK_DATE" > fix.yaml
          run 0 "clean"

          printf 'vulnerabilities:\n  - id: CVE-1\n    statement: "soon"\n    expired_at: %s\n' "$SOON_DATE" > fix.yaml
          run 0 "expiring-soon (warn, not fail)"

          printf 'vulnerabilities:\n  - id: CVE-1\n' > fix.yaml
          run 1 "naked"

          printf 'vulnerabilities:\n  - id: CVE-1\n    statement: "x"\n    expired_at: %s\n' "$PAST_DATE" > fix.yaml
          run 1 "expired"

          printf 'vulnerabilities:\n  - id: CVE-1\n    statement: "forever"\n    expired_at: %s\n' "$FAR_DATE" > fix.yaml
          run 1 "over-ttl"

          if [ "$fails" -ne 0 ]; then
            echo "::error::SELFTEST REGRESSION — $fails meta-guard scenario(s) wrong."
            exit 1
          fi
          echo "All security-policy meta-guard scenarios behaved correctly."
